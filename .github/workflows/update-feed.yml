name: Update feed (daily)

on:
  push:
    branches:
      - main
    paths:
      - "default-sources.json"
      - "scripts/build-feed.mjs"
      - "scripts/package.json"
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

concurrency:
  group: update-feed
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install script dependencies
        working-directory: scripts
        run: npm install --no-fund --no-audit

      - name: Build feed-investor.json
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: node scripts/build-feed.mjs

      - name: Validate JSON shape
        run: |
          node -e "JSON.parse(require('fs').readFileSync('feed-investor.json','utf8')); console.log('parse OK');"
          node <<'NODE'
          const j = JSON.parse(require('fs').readFileSync('feed-investor.json','utf8'));
          for (const k of ['version','updatedAt','items']) {
            if (!(k in j)) process.exit(1);
          }
          if (!Array.isArray(j.items)) process.exit(1);
          console.log('keys OK, items:', j.items.length);
          NODE

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed-investor.json
          if git diff --staged --quiet; then
            echo "No changes to feed-investor.json"
          else
            git commit -m "chore(feed): daily automated update"
            git push
          fi

