name: Validate feed

on:
  push:
    paths:
      - "feed-investor.json"
      - "default-sources.json"
      - "scripts/build-feed.mjs"
      - "scripts/package.json"
      - "scripts/validate-feed-ci.mjs"
      - ".github/workflows/validate-feed.yml"
      - ".github/workflows/update-feed.yml"
  pull_request:
    paths:
      - "feed-investor.json"
      - "default-sources.json"
      - "scripts/build-feed.mjs"
      - "scripts/package.json"
      - "scripts/validate-feed-ci.mjs"
      - ".github/workflows/validate-feed.yml"
      - ".github/workflows/update-feed.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate JSON files
        run: node scripts/validate-feed-ci.mjs
